services:
  # FastAPI 애플리케이션 (영수증 추천 + 컴플라이언스 감사 API)
  api:
    build: .
    image: bizplay-ai-api:1.0.0
    container_name: bizplay_ai_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # 컨테이너 네트워크에서는 서비스명(qdrant)으로 접근 -> .env 의 localhost 오버라이드
      - QDRANT_URL=http://qdrant:6333
      # 기본 DB: 영속 볼륨의 SQLite (마이그레이션 검증 완료 경로). 슬래시 4개 = 절대경로.
      # 번들된 postgres 로 전환 시: 아래 DB_URL 주석 해제 + depends_on 에 postgres 추가
      #   (단, 컴플라이언스 마이그레이션의 boolean server_default 호환성 확인 필요).
      - DB_URL=sqlite:////app/data/expense_ai.db
      # - DB_URL=postgresql+psycopg2://postgres:postgres@postgres:5432/expense_ai
      - ENVIRONMENT=production
      # LLM/임베딩 자격증명은 호스트 환경 또는 같은 폴더의 .env 에서 주입(이미지에 굽지 않음)
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_API_BASE=${OPENAI_API_BASE:-https://api.runpod.ai/v2/v7fykeg2rhwgse/openai/v1}
      - LLM_MODEL=${LLM_MODEL:-Qwen/Qwen2.5-14B-Instruct-AWQ}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-text-embedding-3-small}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
      # 사내 SSL 인터셉션 환경이면 CA 를 마운트하고 아래를 컨테이너 내 경로로 지정:
      # - SSL_CERT_FILE=/certs/corp-ca.pem
      # - REQUESTS_CA_BUNDLE=/certs/corp-ca.pem
    depends_on:
      - qdrant
    volumes:
      - api_data:/app/data
      # 사내 CA 마운트 예시(읽기전용): - ./certs:/certs:ro

  postgres:
    image: postgres:15
    container_name: expense_ai_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: expense_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d expense_ai"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: expense_ai_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"  # REST / HTTP API
      - "6334:6334"  # gRPC API
    volumes:
      - qdrant_data:/qdrant/storage

# 컨테이너가 꺼지거나 삭제되어도 데이터가 유지되도록 named volume 사용
volumes:
  postgres_data:
  qdrant_data:
  api_data:  # api 서비스의 SQLite DB 영속화
