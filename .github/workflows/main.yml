name: CI

# main 브랜치 Push 또는 main 대상 PR 시 테스트를 실행한다.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: pytest (Python 3.12)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests
        # 테스트는 인메모리 SQLite + Mock(LLM/임베딩)으로 동작 -> 외부 DB/LLM 불필요
        env:
          ENVIRONMENT: ci
        run: pytest -q
